name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Client is generated to src/generated/prisma (gitignored); required for tests and build.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Dashboard metric strip rules
        run: npm run validate:dashboard-ui

      - name: Unit tests
        run: npm test

      - name: Next.js build
        run: npm run build
