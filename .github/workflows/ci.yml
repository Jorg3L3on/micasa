name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts loads this via env(); not required to be reachable for generate/tests/build on CI.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - run: npm ci

      # Client is generated to src/generated/prisma (gitignored); required for tests and build.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Dashboard metric strip rules
        run: npm run validate:dashboard-ui

      - name: Prisma import rules
        run: npm run validate:prisma-imports

      - name: Unit tests
        run: npm test

      - name: Cross-tenant isolation tests
        run: npm run test:isolation

      - name: Next.js build
        env:
          # Source map upload via withSentryConfig (org/project in next.config.ts)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CI: true
        run: npm run build
